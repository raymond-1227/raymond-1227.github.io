name: Brizy Pages Optimization
on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # Install minification packages globally
      - name: Install Minifiers
        run: npm install -g html-minifier terser clean-css-cli

      # Replace font provider domains across all HTML and CSS files
      - name: Replace Bunny Fonts to Google Fonts
        run: |
          find . -type f -name "*.html" -exec sed -i 's/fonts.bunny.net/fonts.googleapis.com/g' {} +
          find . -type f -name "*.css" -exec sed -i 's/fonts.bunny.net/fonts.googleapis.com/g' {} +

      # Minify all non-minified CSS files by stripping spaces and comments
      - name: Optimize CSS
        run: |
          for f in $(find . -name "*.css" ! -name "*.min.css"); do
            cleancss -o "$f" "$f"
          done

      # Strip formatting and comments from JS files without renaming variables or altering logic
      - name: Optimize JS (Safe Mode)
        run: |
          for f in $(find . -name "*.js" ! -name "*.min.js"); do
            terser "$f" -o "$f" --format comments=false
          done

      # Commit and push optimized changes back to the repository
      - name: Commit & Push Optimized Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "chore: safe auto-optimized assets & fonts"
          git push